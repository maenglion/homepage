name: Deploy to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'          # supabase 폴더 변경 시에만 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_ID"

      # 레거시 마이그레이션(이미 out-of-band 적용됨)은 이력 테이블이 비어 있어
      # db push 가 재실행 → "type already exists" 로 실패한다.
      # 이력만 'applied' 로 표시해 재실행을 차단한다. 0001 은 표시하지 않으므로
      # db push 가 정상 실행하며, 0001 은 IF NOT EXISTS/OR REPLACE 로 멱등하다.
      - name: Repair legacy migration history
        run: |
          for v in 20260710000000 20260711000000 20260712000000 \
                   20260715000000 20260715000001 20260715000002 \
                   20260715000003 20260715000004 20260715000005 20260715000006; do
            supabase migration repair --status applied "$v" || true
          done

      # --include-all: 우리 스키마는 000X 번호, 레거시 이력은 2026… 타임스탬프라
      # 새 000X 마이그레이션은 항상 "이미 적용된 것보다 앞"으로 판정된다. 순서 무시하고
      # 이력에 없는 것만 적용한다(레거시·0001은 이력에 있어 건너뜀, 신규만 실행 · 전부 멱등).
      - name: Push migrations
        run: supabase db push --include-all

      # Edge Function 배포 (functions 폴더가 있을 때만 시도)
      - name: Deploy Edge Functions
        run: |
          if [ -d "supabase/functions" ]; then
            supabase functions deploy --project-ref "$PROJECT_ID" || echo "no functions or deploy skipped"
          else
            echo "supabase/functions 없음 — 건너뜀"
          fi
