[[redirects]]
  from = "/preprocess"
  to = "/preprocess.html"
  status = 301

[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 301

[[redirects]]
  from = "/submit"
  to = "/submit.html"
  status = 301

[[redirects]]
  from = "/receipt"
