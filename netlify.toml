[build]
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/sdla"
  to = "/slda.html"
  status = 301

[[redirects]]
  from = "/sdla-analysis"
  to = "/slda.html"
  status = 301

[[redirects]]
  from = "/slda"
  to = "/slda.html"
  status = 301

# SLDA 신청 파이프라인 — 클린 진입 경로
[[redirects]]
  from = "/start"
